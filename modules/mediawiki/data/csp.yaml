# Only add a domain pursuant to the policy below. Please also be restrictive in which list.
# See https://meta.miraheze.org/wiki/Tech:CSP_Policy.
default-src: 
  - "'self'"
  - '*.miraheze.org'
  - '*.wikitide.org'

script-src:
  - 'blob:'
  - "'self'"
  - "'unsafe-inline'"
  - "'unsafe-eval'"
  - '*.miraheze.org'
  - '*.wikitide.org'
  - 'ajax.cloudflare.com'
  - 'cdnjs.cloudflare.com'
  - 'cdn.jsdelivr.net'
  - 'www.gstatic.cn'
  - 'hcaptcha.com'
  - '*.hcaptcha.com'
  - 'challenges.cloudflare.com'

style-src:
  - "'self'"
  - 'data:'
  - "'unsafe-inline'"
  - 'miraheze.org'
  - 'wikitide.org'
  - '*.miraheze.org'
  - '*.wikitide.org'
  - 'www.gstatic.com'
  - 'fonts.googleapis.com'
  - 'cdn.jsdelivr.net'
  - 'cdnjs.cloudflare.com'
  - 'hcaptcha.com'
  - '*.hcaptcha.com'

img-src:
  - 'blob:'
  - "'self'"
  - 'data:'
  - 'miraheze.org'
  - 'wikitide.org'
  - '*.miraheze.org'
  - '*.wikitide.org'

font-src:
  - "'self'"
  - 'data:'
  - '*.miraheze.org'
  - '*.wikitide.org'
  - 'fonts.gstatic.com'
  - 'fonts.googleapis.com'
  - 'cdnjs.cloudflare.com'
  - 'cdn.jsdelivr.net'

media-src:
  - "'self'"
  - 'blob:'
  - '*.miraheze.org'
  - '*.wikitide.org'
  - 'upload.wikimedia.org'

frame-src:
  - "'self'"
  - '*.miraheze.org'
  - '*.wikitide.org'
  - '*.wikitide.net'
  - 'archive.org'

connect-src:
  - "'self'"
  - 'blob:'
  - '*.miraheze.org'
  - '*.wikitide.org'
  - 'cdn.jsdelivr.net'
  - 'hcaptcha.com'
  - '*.hcaptcha.com'
  - '1.1.1.1'
